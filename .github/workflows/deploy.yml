name: Build & deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    # Daily at 11:00 UTC — well after the NHL data settles for the previous day.
    - cron: "0 11 * * *"
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# Cancel an in-flight deploy if a new commit lands; keep the latest run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Python unit tests
        run: python3 -m unittest discover -s tests -p 'test_*.py' -v

      - name: JS unit tests
        run: node --test 'tests/unit/*.mjs'

      - name: Install Playwright + Chromium
        # No committed package.json — install Playwright into node_modules
        # (gitignored) for this job. Then download just chromium.
        run: |
          npm install --no-save --no-package-lock --silent playwright
          npx playwright install --with-deps chromium

      - name: Start dev server
        run: |
          python3 server.py > /tmp/server.log 2>&1 &
          for i in $(seq 1 60); do
            curl -fs http://localhost:8000/data/years.json > /dev/null && exit 0
            sleep 0.5
          done
          echo "server did not come up"; cat /tmp/server.log; exit 1

      - name: Playwright E2E tests
        # In CI we don't have the system Chrome, so override _helpers.mjs to
        # use the playwright-bundled chromium installed in the step above.
        env:
          PLAYWRIGHT_CI: "1"
        run: node --test 'tests/e2e/test_*.mjs'

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Restore data/ cache across runs
        # Hits between runs keep old draft years' files without rebuilding.
        # Only the latest PREWARM_COUNT years are refreshed each run.
        uses: actions/cache@v4
        with:
          path: data
          key: nhl-data-v3-${{ github.run_id }}
          restore-keys: |
            nhl-data-v3-

      - name: Refresh latest draft years
        run: python3 server.py --build

      - uses: actions/configure-pages@v5
        with:
          # Auto-enable Pages on the first run so no manual UI step is needed.
          enablement: true

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Ship the whole repo root (index.html, app.js, styles.css, data/).
          # actions/upload-pages-artifact ignores .git automatically.
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
