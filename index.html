<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NHL Draft Explorer</title>
    <link rel="stylesheet" href="styles.css" />
    <script type="module" src="app.js"></script>
  </head>
  <body>
    <main class="container">
      <header class="app-header">
        <a id="team-logo-link" target="_blank" rel="noopener noreferrer" hidden>
          <img id="team-logo" class="team-logo" alt="" />
        </a>
        <h1>
          <img class="nhl-crest" src="https://assets.nhle.com/logos/nhl/svg/NHL_light.svg" alt="NHL" />
          Draft Explorer
        </h1>
      </header>

      <section class="controls">
        <label>
          Year
          <select id="year"></select>
        </label>
        <label>
          Team
          <select id="team"></select>
        </label>
      </section>

      <div id="status" class="status" role="status" aria-live="polite"></div>

      <table id="picks" class="picks">
        <thead>
          <tr>
            <th rowspan="2" data-key="overallPick">Overall</th>
            <th rowspan="2" data-key="round">Round</th>
            <th rowspan="2" aria-label="Team logo"></th>
            <th rowspan="2" data-key="name">Player</th>
            <th rowspan="2" data-key="countryCode">Nat</th>
            <th rowspan="2" data-key="positionCode">Pos</th>
            <th colspan="6" class="stats-group">NHL Stats</th>
          </tr>
          <tr>
            <th class="stats-sub" data-key="gamesPlayed">GP</th>
            <th class="stats-sub" data-key="goals">G</th>
            <th class="stats-sub" data-key="assists">A</th>
            <th class="stats-sub" data-key="points">PTS</th>
            <th class="stats-sub" data-key="plusMinus">+/-</th>
            <th class="stats-sub" data-key="pim">PIM</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </main>
  </body>
</html>
